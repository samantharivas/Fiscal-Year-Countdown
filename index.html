<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fiscal Year Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>

<style>
:root {
    --bg-deep:    #080b10;
    --bg-mid:     #0d1117;
    --panel-bg:   rgba(13, 17, 26, 0.75);
    --border:     rgba(255, 215, 0, 0.15);
    --gold:       #ffd700;
    --gold-glow:  rgba(255, 215, 0, 0.6);
    --silver:     #c0c8d8;
    --text-dim:   rgba(192, 200, 216, 0.6);
}

body {
    margin: 0;
    overflow: hidden;
    background-color: #05070a;
    background-image:
        radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(192,200,216,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, #14171d 0%, var(--bg-deep) 70%);
    font-family: 'Inter', Arial, sans-serif;
    color: var(--silver);
}

/* Starfield background */
#skyline {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

/* Individual stars (generated by JS) */
.star {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.6) 45%, transparent 75%);
    box-shadow: 0 0 6px 1px rgba(255,255,255,0.6);
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    animation-delay: var(--delay);
}

.star.gold {
    background: radial-gradient(circle, #fff7d6 0%, rgba(255,215,0,0.7) 45%, transparent 75%);
    box-shadow: 0 0 8px 1px rgba(255,215,0,0.6);
}

@keyframes twinkle {
    0%   { opacity: 0.15; transform: scale(0.7); }
    100% { opacity: 1;    transform: scale(1.15); }
}

/* Spotlight beams */
.spotlight {
    position: absolute;
    width: 180px;
    height: 120vh;
    background: radial-gradient(ellipse, rgba(180,150,40,0.04), transparent 70%);
    transform: rotate(25deg);
    animation: sweep 8s infinite ease-in-out;
}

@keyframes sweep {
    0%   { transform: translateX(-200px) rotate(18deg); }
    50%  { transform: translateX(100vw)  rotate(26deg); }
    100% { transform: translateX(-200px) rotate(18deg); }
}

/* Main container */
#container {
    position: absolute;
    top: 45%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
    z-index: 10;
}

/* Frosted glass card */
#card {
    display: inline-block;
    padding: 5.5rem 9.5rem;
    text-align: center;
    transition: opacity 0.6s ease, transform 0.6s ease;
    background:
        linear-gradient(160deg, rgba(30,34,44,0.92) 0%, rgba(13,17,26,0.94) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
        0 0 60px rgba(255, 215, 0, 0.06),
        0 8px 40px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
}

#card.fade-out {
    opacity: 0;
    transform: scale(0.92);
    pointer-events: none;
}

#title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 8px;
    color: var(--gold);
    margin-bottom: 0.4rem;
    text-shadow: 0 0 18px var(--gold-glow);
    text-transform: uppercase;
}

#subtitle-label {
    font-size: 0.95rem;
    letter-spacing: 4px;
    color: var(--text-dim);
    margin-bottom: 2rem;
    text-transform: uppercase;
}

/* Divider line */
.divider {
    width: 60%;
    height: 1px;
    margin: 0 auto 2rem;
    background: linear-gradient(to right, transparent, var(--border), transparent);
}

/* ── Times Square ball drop ── */
#ball-track {
    position: relative;
    width: 4px;
    height: 200px;
    margin: 0 auto 0.6rem;
    background: linear-gradient(to right,
        rgba(180,190,210,0.15),
        rgba(220,228,240,0.85),
        rgba(180,190,210,0.15));
    border-radius: 2px;
    box-shadow: 0 0 6px rgba(200,210,230,0.35);
}

/* Star topper at the very top of the flagpole */
#ball-track::before {
    content: '★';
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 10px var(--gold-glow);
}

/* Rooftop base platform the pole stands on */
#ball-track::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 50%;
    width: 30px;
    height: 5px;
    transform: translateX(-50%);
    border-radius: 2px;
    background: linear-gradient(to bottom, #aeb6c6, #6c7488);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Freestanding neon FY 2027 characters at the base of the pole */
#pole-sign {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    margin: 0 auto 1.6rem;
}

#pole-sign span {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    letter-spacing: 3px;
    /* LED-bulb dot matrix filling the characters (gold neon) */
    background:
        radial-gradient(circle, #fff6cf 0 1px, rgba(255,215,0,0.25) 1.4px, transparent 2px) 0 0 / 5px 5px,
        linear-gradient(#ffd700, #ffb800);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    filter:
        drop-shadow(0 0 4px var(--gold-glow))
        drop-shadow(0 0 10px rgba(255,215,0,0.35));
}

#pole-sign span:first-child {
    font-size: 2.5rem;
}

#pole-sign span:last-child {
    font-size: 2.5rem;
}

#ball {
    position: absolute;
    left: 50%;
    top: 0;
    width: 88px;
    height: 88px;
    transform: translateX(-50%);
    border-radius: 50%;
    overflow: hidden;
    background:
        /* fine geodesic triangle tessellation — three 60°-offset grids = equilateral panels */
        repeating-linear-gradient(60deg,
            rgba(120,80,0,0.30) 0 0.5px, transparent 0.5px 10px),
        repeating-linear-gradient(-60deg,
            rgba(120,80,0,0.30) 0 0.5px, transparent 0.5px 10px),
        repeating-linear-gradient(0deg,
            rgba(120,80,0,0.24) 0 0.5px, transparent 0.5px 8.66px),
        /* faint bright facet edges catching light */
        repeating-linear-gradient(60deg,
            rgba(255,255,255,0.10) 0 0.5px, transparent 0.5px 10px),
        repeating-linear-gradient(-60deg,
            rgba(255,255,255,0.10) 0 0.5px, transparent 0.5px 10px),
        /* random crystal glints */
        radial-gradient(circle at 30% 26%, rgba(255,255,255,0.9) 0%, transparent 6%),
        radial-gradient(circle at 62% 40%, rgba(255,255,255,0.5) 0%, transparent 5%),
        radial-gradient(circle at 44% 64%, rgba(255,255,255,0.4) 0%, transparent 5%),
        /* spherical body shading + darkened rim for roundness */
        radial-gradient(circle at 35% 30%,
            #fffef5 0%, #ffe85a 24%, #ffcf00 50%, #b07d05 82%, #6e4d04 100%);
    box-shadow:
        0 0 35px rgba(255,215,0,0.95),
        0 0 70px rgba(255,215,0,0.6),
        0 0 110px rgba(255,215,0,0.35),
        inset 0 0 18px rgba(255,255,255,0.35),
        inset -6px -8px 22px rgba(80,55,0,0.55);
    animation: ballGlow 0.9s ease-in-out infinite alternate;
    transition: top 0.9s linear, transform 0.6s ease, box-shadow 0.6s ease;
    z-index: 2;
}

/* Final 10 seconds: isolate into a focused full-screen view (starry sky kept) */
#card.finale {
    position: fixed;
    inset: 0;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 1.5rem;
    background: radial-gradient(ellipse at center,
        rgba(8,11,16,0.35) 0%, rgba(5,7,10,0.7) 100%);
    border: none;
    border-radius: 0;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    box-shadow: none;
    z-index: 15;
    animation: finaleIn 0.6s ease both;
}

@keyframes finaleIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

/* Hide everything except the seconds number */
#card.finale #title,
#card.finale #subtitle-label,
#card.finale #pole-sign,
#card.finale .divider,
#card.finale #ball-track,
#card.finale #countdown-label {
    display: none;
}

/* Rotating crystal shimmer sweeping across the facets */
#ball::before {
    content: '';
    position: absolute;
    inset: -25%;
    border-radius: 50%;
    background:
        conic-gradient(from 0deg,
            transparent 0deg,
            rgba(255,255,255,0.28) 25deg,
            transparent 60deg,
            rgba(255,255,255,0.18) 140deg,
            transparent 200deg,
            rgba(255,255,255,0.22) 300deg,
            transparent 360deg);
    mix-blend-mode: screen;
    animation: ballSpin 6s linear infinite;
}

/* Bright top specular highlight */
#ball::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,0.85) 0%, transparent 22%);
    pointer-events: none;
}

@keyframes ballSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

@keyframes ballGlow {
    0%   { box-shadow: 0 0 28px rgba(255,215,0,0.7), 0 0 55px rgba(255,215,0,0.4),  0 0 90px rgba(255,215,0,0.25), inset 0 0 14px rgba(255,255,255,0.6); }
    100% { box-shadow: 0 0 45px rgba(255,215,0,1),   0 0 90px rgba(255,215,0,0.7), 0 0 140px rgba(255,215,0,0.45), inset 0 0 18px rgba(255,255,255,0.9); }
}

/* ── Countdown digit tiles ── */
#countdown {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 1rem;
}

.time-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
}

.tile {
    font-family: 'Orbitron', sans-serif;
    font-size: 5.6rem;
    font-weight: 900;
    color: #fff;
    background: linear-gradient(160deg, #20242e 0%, #0c0f16 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0.7rem 1.3rem;
    box-sizing: border-box;
    width: 3.4ch;
    font-variant-numeric: tabular-nums;
    text-align: center;
    text-shadow: 0 0 20px var(--gold-glow);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -10px 20px rgba(0,0,0,0.4),
        0 6px 16px rgba(0,0,0,0.5);
}

.unit-label {
    font-size: 0.9rem;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
}

.colon {
    font-family: 'Orbitron', sans-serif;
    font-size: 5rem;
    color: var(--gold);
    padding-top: 0.4rem;
    animation: blink 1s steps(1) infinite;
}

@keyframes blink {
    50% { opacity: 0.25; }
}

/* Final 10 seconds mode — collapse to a single big pulsing seconds number,
   keeping the ball drop and sign fully visible */
#countdown.big {
    gap: 0;
}

/* Hide every unit except the seconds, and the colons */
#countdown.big .time-unit,
#countdown.big .colon {
    display: none;
}

#countdown.big .time-unit:last-child {
    display: flex;
}

/* The seconds number styled like the FY 2027 neon sign — LED dot-matrix fill */
#countdown.big .time-unit:last-child .tile {
    font-size: 22rem;
    width: auto;
    padding: 0;
    border: none;
    background:
        radial-gradient(circle, #fff6cf 0 2px, rgba(255,215,0,0.28) 2.6px, transparent 3.4px) 0 0 / 11px 11px,
        linear-gradient(#ffd700, #ffb800);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    text-shadow: none;
    box-shadow: none;
    filter:
        drop-shadow(0 0 8px var(--gold-glow))
        drop-shadow(0 0 22px rgba(255,215,0,0.55))
        drop-shadow(0 0 44px rgba(255,215,0,0.35));
}

#countdown.big .time-unit:last-child .unit-label {
    font-size: 0.8rem;
    letter-spacing: 6px;
    margin-top: 0.6rem;
    color: var(--gold);
    text-shadow: 0 0 12px var(--gold-glow);
}

/* Each tick: heartbeat burst, then settle */
.tile.tick {
    animation: countPulse 1s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes countPulse {
    0%   { transform: scale(1.8); opacity: 0; }
    22%  { transform: scale(0.92); opacity: 1; }
    40%  { transform: scale(1.06); }
    60%  { transform: scale(0.98); }
    100% { transform: scale(1);    opacity: 1; }
}

/* Floating sparkles */
.sparkle {
    position: fixed;
    bottom: -40px;
    background:
        radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,215,0,0.6) 30%, transparent 60%);
    /* 4-point star shape */
    clip-path: polygon(
        50% 0%, 58% 42%, 100% 50%, 58% 58%,
        50% 100%, 42% 58%, 0% 50%, 42% 42%);
    pointer-events: none;
    z-index: 1;
    animation: rise linear infinite, sparkleTwinkle ease-in-out infinite alternate;
}

@keyframes rise {
    0%   { transform: translateY(0) translateX(0) rotate(0deg);   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.8; }
    100% { transform: translateY(-105vh) translateX(var(--drift)) rotate(180deg); opacity: 0; }
}

@keyframes sparkleTwinkle {
    0%   { filter: brightness(0.6); }
    100% { filter: brightness(1.6) drop-shadow(0 0 6px rgba(255,215,0,0.8)); }
}

#countdown-label {
    font-size: 0.7rem;
    letter-spacing: 5px;
    color: var(--text-dim);
    margin-top: 1.4rem;
    text-transform: uppercase;
}

@keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
}

@keyframes shake {
    0%   { transform: translateX(-4px); }
    50%  { transform: translateX(4px); }
    100% { transform: translateX(-4px); }
}

/* Celebration screen */
#celebration {
    position: absolute;
    inset: 0;
    display: none;
    opacity: 0;
    transition: opacity 0.8s ease;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    background: radial-gradient(ellipse at center, rgba(13,17,26,0.85) 0%, rgba(8,11,16,0.95) 100%);
    z-index: 20;
}

#celebration.show {
    opacity: 1;
}

#celebration h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 5rem;
    background: linear-gradient(100deg,
        #b8860b 0%, #ffd700 25%, #fff6cf 50%, #ffd700 75%, #b8860b 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    filter: drop-shadow(0 0 40px var(--gold-glow));
    margin-bottom: 0.5rem;
    animation:
        celebIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both,
        shimmer 4s linear infinite;
}

@keyframes shimmer {
    to { background-position: 200% center; }
}

#celebration .subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2rem;
    color: #fff;
    letter-spacing: 6px;
    text-shadow: 0 0 20px rgba(255,255,255,0.6);
    animation: celebIn 1s 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    margin-bottom: 1.5rem;
}

#celebration .year-pop {
    display: inline-block;
    color: var(--gold);
    text-shadow: 0 0 24px var(--gold-glow);
    animation: yearPop 1s 0.7s cubic-bezier(0.34, 1.8, 0.64, 1) both;
}

@keyframes yearPop {
    0%   { transform: scale(0) rotate(-12deg); opacity: 0; }
    100% { transform: scale(1) rotate(0);      opacity: 1; }
}

#celebration p {
    font-size: 1.1rem;
    letter-spacing: 3px;
    color: var(--text-dim);
    animation: celebIn 1s 0.9s ease-out both;
    text-transform: uppercase;
}

@keyframes celebIn {
    from { opacity: 0; transform: scale(0.6) translateY(20px); }
    to   { opacity: 1; transform: scale(1)   translateY(0); }
}

/* Canvas overlays */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
}

/* Audio on/off toggle */
#audio-toggle {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 40;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    line-height: 1;
    cursor: pointer;
    color: rgba(192, 200, 216, 0.35);
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 50%;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0.35;
    transition: opacity 0.25s ease, color 0.25s ease, background 0.25s ease;
    user-select: none;
}

#audio-toggle:hover {
    opacity: 1;
    color: var(--gold);
    background: rgba(0, 0, 0, 0.5);
}

#audio-toggle.muted {
    color: rgba(192, 200, 216, 0.3);
}
</style>
</head>

<body>

<div id="skyline"></div>

<button id="audio-toggle" title="Toggle sound" aria-label="Toggle sound">🔊</button>

<div class="spotlight" style="left:10%"></div>
<div class="spotlight" style="left:60%"></div>

<div id="container">
    <div id="card">
        <div id="title">✨ New Fiscal Year ✨</div>
        <div id="subtitle-label">Countdown to FY2027 &bull; July 1, 2026</div>
        <div id="ball-track"><div id="ball"></div></div>
        <div id="pole-sign"><span>FY</span><span>2027</span></div>
        <div class="divider"></div>
        <div id="countdown">
            <div class="time-unit" id="daysUnit"><div class="tile" id="d">00</div><div class="unit-label">Days</div></div>
            <div class="colon" id="daysColon">:</div>
            <div class="time-unit"><div class="tile" id="h">00</div><div class="unit-label">Hours</div></div>
            <div class="colon">:</div>
            <div class="time-unit"><div class="tile" id="mi">00</div><div class="unit-label">Minutes</div></div>
            <div class="colon">:</div>
            <div class="time-unit"><div class="tile" id="se">00</div><div class="unit-label" id="seLabel">Seconds</div></div>
        </div>
        <div id="countdown-label">Until the Ball Drops 🥂</div>
    </div>
</div>

<div id="celebration">
    <h1> HAPPY NEW FISCAL YEAR </h1>
    <div class="subtitle">FY<span class="year-pop">2027</span> IS HERE!</div>
    <p>🥂 Cheers to the New Fiscal Year 🥂</p>
</div>

<canvas id="fireworks"></canvas>
<canvas id="confetti"></canvas>

<script>
const TARGET = new Date("2026-07-01T13:00:00-07:00");

// ─── STARFIELD ────────────────────────────────────────────────────────────────
(function makeStars() {
    const sky = document.getElementById("skyline");
    const COUNT = 120;
    for (let i = 0; i < COUNT; i++) {
        const star = document.createElement("div");
        star.className = "star" + (Math.random() < 0.3 ? " gold" : "");
        const size = Math.random() * 4 + 2;          // 2px – 6px
        star.style.width  = size + "px";
        star.style.height = size + "px";
        star.style.left   = Math.random() * 100 + "%";
        star.style.top    = Math.random() * 100 + "%";
        star.style.setProperty("--dur",   (Math.random() * 2.5 + 1.2) + "s");
        star.style.setProperty("--delay", (Math.random() * 3) + "s");
        sky.appendChild(star);
    }
})();

const countdownEl = document.getElementById("countdown");
const celebrationEl = document.getElementById("celebration");
const dEl  = document.getElementById("d");
const hEl  = document.getElementById("h");
const miEl = document.getElementById("mi");
const seEl = document.getElementById("se");
const seLabelEl = document.getElementById("seLabel");
const daysUnitEl = document.getElementById("daysUnit");
const daysColonEl = document.getElementById("daysColon");
const ballEl = document.getElementById("ball");
const cardEl = document.getElementById("card");

const pad = n => String(n).padStart(2, "0");
let lastSecond = null;
let finaleTriggered = false;

function updateCountdown() {
    const now = new Date();
    const diff = TARGET - now;
    const total = Math.floor(diff / 1000);

    // Zero moment: land on "0", fire the final beep, then transition
    if (total <= 0) {
        if (!finaleTriggered) {
            finaleTriggered = true;

            countdownEl.classList.add("big");
            cardEl.classList.add("finale");
            seLabelEl.textContent = "Seconds Left";
            seEl.textContent = 0;
            seEl.classList.remove("tick");
            void seEl.offsetWidth;   // force reflow
            seEl.classList.add("tick");
            ballEl.style.top = "96px";

            // Final, highest beep fires BEFORE the Happy New Year moment
            beep(1380);

            // Small pause on 0, fade the card out, then reveal the celebration
            setTimeout(() => {
                cardEl.classList.add("fade-out");
                setTimeout(startCelebration, 650);
            }, 800);
        }
        return;
    }

    const d = Math.floor(total / 86400);
    const h = Math.floor((total % 86400) / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;

    // Ball drop over the final 60 seconds (0% -> 100% down the track)
    if (total <= 60) {
        const dropped = (60 - total) / 60;        // 0 at 60s, 1 at 0s
        ballEl.style.top = (dropped * 96) + "px";
    } else {
        ballEl.style.top = "0px";
    }

    if (total <= 10) {
        countdownEl.classList.add("big");
        cardEl.classList.add("finale");
        seLabelEl.textContent = "Seconds Left";

        if (lastSecond !== s) {
            seEl.textContent = total;

            // Re-trigger the pulse animation
            seEl.classList.remove("tick");
            void seEl.offsetWidth;   // force reflow
            seEl.classList.add("tick");

            // Rising pitch in the final 3 seconds for extra tension
            beep(total <= 3 ? 660 + (4 - total) * 180 : 880);
            lastSecond = s;        }
    } else {
        countdownEl.classList.remove("big");
        cardEl.classList.remove("finale");
        seEl.classList.remove("tick");
        seLabelEl.textContent = "Seconds";

        // Drop the Days tile once less than a day remains
        const showDays = d > 0;
        daysUnitEl.style.display  = showDays ? "" : "none";
        daysColonEl.style.display = showDays ? "" : "none";

        dEl.textContent  = pad(d);
        hEl.textContent  = pad(h);
        miEl.textContent = pad(m);
        seEl.textContent = pad(s);
    }
}

const fwCanvas = document.getElementById("fireworks");
const fw = fwCanvas.getContext("2d");
fwCanvas.width  = window.innerWidth;
fwCanvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    fwCanvas.width   = window.innerWidth;

const FW_PALETTES = [
    ['#FFD700','#FFC400','#FFFFFF'],   // rich gold
    ['#C0C0C0','#E8E8E8','#FFFFFF'],   // silver
    ['#FFD700','#C0C0C0','#FFFFFF'],   // gold & silver mix
    ['#FFFFFF','#FFF8DC','#FFD700'],   // bright white & gold
];

let rockets = [];
let sparks  = [];
let fwRunning = false;

class Rocket {
    constructor() {
        this.x       = fwCanvas.width  * (0.1 + Math.random() * 0.8);
        this.y       = fwCanvas.height + 10;
        this.vy      = -(Math.random() * 7 + 13);
        this.vx      = (Math.random() - 0.5) * 2.5;
        this.targetY = fwCanvas.height * (0.08 + Math.random() * 0.42);
        this.palette = FW_PALETTES[Math.floor(Math.random() * FW_PALETTES.length)];
        this.trail   = [];
        this.exploded = false;
    }

    update() {
        this.trail.push({ x: this.x, y: this.y, life: 22 });
        this.x  += this.vx;
        this.y  += this.vy;
        this.vy += 0.28;
        this.trail.forEach(t => t.life--);
        this.trail = this.trail.filter(t => t.life > 0);
        if (this.y <= this.targetY || this.vy >= 0) this.explode();
    }

    explode() {
        this.exploded = true;
        fireworkBoom();
        const count = 110 + Math.floor(Math.random() * 50);
        // Main ring burst
        for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2;
            const speed = Math.random() * 8 + 2;
            const color = this.palette[Math.floor(Math.random() * this.palette.length)];
            sparks.push(new Spark(this.x, this.y, Math.cos(angle)*speed, Math.sin(angle)*speed, color, 2.5));
        }
        // Bright white core flash
        for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 13;
            sparks.push(new Spark(this.x, this.y, Math.cos(angle)*speed, Math.sin(angle)*speed, '#FFFFFF', 1.5));
        }
        // Falling golden rain streamers
        for (let i = 0; i < 24; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 4;
            sparks.push(new Spark(this.x, this.y, Math.cos(angle)*speed, Math.sin(angle)*speed - 1, this.palette[0], 1, 180));
        }
    }

    draw() {
        // Trail as a single fading line (cheap)
        if (this.trail.length > 1) {
            fw.globalAlpha = 0.5;
            fw.strokeStyle = '#FFF8DC';
            fw.lineWidth   = 2;
            fw.beginPath();
            fw.moveTo(this.trail[0].x, this.trail[0].y);
            for (let i = 1; i < this.trail.length; i++) {
                fw.lineTo(this.trail[i].x, this.trail[i].y);
            }
            fw.stroke();
        }
        // Bright head
        fw.globalAlpha = 1;
        fw.fillStyle   = '#FFFFFF';
        fw.fillRect(this.x - 2, this.y - 2, 4, 4);
    }
}

class Spark {
    constructor(x, y, vx, vy, color, size = 2, life = 90) {
        this.x       = x;
        this.y       = y;
        this.px      = x;
        this.py      = y;
        this.vx      = vx;
        this.vy      = vy;
        this.color   = color;
        this.size    = size + Math.random() * 1.2;
        this.life    = life + Math.floor(Math.random() * 40);
        this.maxLife = this.life;
    }

    update() {
        this.px = this.x;
        this.py = this.y;
        this.x  += this.vx;
        this.y  += this.vy;
        this.vx *= 0.965;
        this.vy *= 0.965;
        this.vy += 0.10;
        this.life--;
    }

    draw() {
        const alpha = this.life / this.maxLife;
        fw.globalAlpha = alpha;
        fw.strokeStyle = this.color;
        fw.lineWidth   = this.size;
        fw.beginPath();
        fw.moveTo(this.px, this.py);
        fw.lineTo(this.x, this.y);
        fw.stroke();
    }
}

function animateFW() {
    if (!fwRunning) return;

    // Dark fade trail (source-over first)
    fw.globalCompositeOperation = 'source-over';
    fw.globalAlpha = 1;
    fw.fillStyle   = 'rgba(0,0,0,0.18)';
    fw.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

    // Additive blending makes colors bloom like real fireworks
    fw.globalCompositeOperation = 'lighter';
    fw.lineCap = 'round';

    rockets = rockets.filter(r => !r.exploded);
    rockets.forEach(r => { r.update(); r.draw(); });

    // Hard cap to keep things smooth on slower machines
    if (sparks.length > 2000) sparks.splice(0, sparks.length - 2000);
    sparks = sparks.filter(s => s.life > 0);
    sparks.forEach(s => { s.update(); s.draw(); });

    fw.globalCompositeOperation = 'source-over';
    fw.globalAlpha = 1;

    requestAnimationFrame(animateFW);
}

function launchFirework() {
    // Occasional volley of 2-3 rockets for that big-show feel
    const volley = Math.random() < 0.35 ? Math.floor(Math.random() * 2) + 2 : 1;
    for (let i = 0; i < volley; i++) {
        setTimeout(() => rockets.push(new Rocket()), i * 180);
    }
}

let confetti = [];

const CONF_COLORS = ['#FFD700','#FFC400','#C0C0C0','#E8E8E8','#FFFFFF','#1a1a1a','#000000'];

function makeConfettiBurst() {
    for (let i = 0; i < 160; i++) {
        confetti.push({
            x:          Math.random() * confCanvas.width,
            y:          -20 - Math.random() * 60,
            vx:         (Math.random() - 0.5) * 2,
            vy:         Math.random() * 0.9 + 0.3,   // slow: 0.3–1.2 px/frame
            rot:        Math.random() * Math.PI * 2,
            rotSpeed:   (Math.random() - 0.5) * 0.07,
            w:          Math.random() * 12 + 5,
            h:          Math.random() * 6  + 3,
            c:          CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)],
            sway:       Math.random() * 0.025 + 0.005,
            swayOffset: Math.random() * Math.PI * 2,
            tick:       0,
        });
    }
}

function drawConfetti() {
    if (!confettiRunning) return;
    cx.clearRect(0, 0, confCanvas.width, confCanvas.height);

    for (let i = confetti.length - 1; i >= 0; i--) {
        const c = confetti[i];
        c.tick++;
        c.x   += c.vx + Math.sin(c.tick * c.sway + c.swayOffset) * 1.2;
        c.y   += c.vy;
        c.rot += c.rotSpeed;

        cx.save();
        cx.translate(c.x, c.y);
        cx.rotate(c.rot);
        cx.globalAlpha = 0.92;
        cx.fillStyle   = c.c;
        cx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
        cx.restore();

        if (c.y > confCanvas.height + 30) confetti.splice(i, 1);
    }

    requestAnimationFrame(drawConfetti);
}

// ─── AUDIO (Web Audio API — no external files needed) ────────────────────────
let audioCtx = null;
let masterGain = null;
let soundEnabled = true;
function getCtx() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = soundEnabled ? 1 : 0;
        masterGain.connect(audioCtx.destination);
    }
    return audioCtx;
}
// All Web Audio nodes route through this so one switch controls everything
function audioOut() {
    getCtx();
    return masterGain;
}

// ─── SAMPLE PLAYBACK (real MP3 files via <audio> — works even over file://) ────
// fetch()/decodeAudioData is blocked on the file:// protocol, so we use plain
// HTMLAudioElements which are allowed to load local media files.
const soundElements = {};   // name -> template HTMLAudioElement
const soundFailed   = {};   // name -> true if the file couldn't load
const activeSounds  = new Set();   // currently-playing MP3 clones (for muting)

function loadSound(name, url) {
    const a = new Audio();
    a.preload = "auto";
    a.src = url;
    a.addEventListener("error", () => { soundFailed[name] = true; }, { once: true });
    a.load();
    soundElements[name] = a;
}

// Play a sample (clones the element so bursts can overlap).
// Returns true if playback was triggered, false if the file isn't available.
function playSound(name, volume = 1, rate = 1) {
    if (!soundEnabled) return false;
    const base = soundElements[name];
    if (!base || soundFailed[name]) return false;
    try {
        const a = base.cloneNode(true);
        a.volume = Math.max(0, Math.min(1, volume));
        a.playbackRate = rate;
        activeSounds.add(a);
        const cleanup = () => activeSounds.delete(a);
        a.addEventListener("ended", cleanup, { once: true });
        a.addEventListener("pause", cleanup, { once: true });
        a.play().catch(() => {});
        return true;
    } catch (e) { return false; }
}

// Preload the celebration audio files

// ─── AUDIO UNLOCK ─────────────────────────────────────────────────────────────
// Browsers block audio until the page is "activated". We attempt to autoplay
// immediately and also unlock on the first sign of activity, so in practice
// sound starts on its own (or the instant the tab gets any activation).
let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    try { const c = getCtx(); if (c.state === "suspended") c.resume(); } catch (e) {}
    // Prime the MP3 elements so they're allowed to play later
    let primed = true;
    Object.values(soundElements).forEach(a => {
        const p = a.play();
        if (p && p.then) {
            p.then(() => { a.pause(); a.currentTime = 0; }).catch(() => { primed = false; });
        }
    });
    // Only latch as unlocked once the context is actually running
    try {
        if (getCtx().state === "running") audioUnlocked = true;
    } catch (e) {}
    // If a celebration is already waiting on audio, fire it now
    if (audioUnlocked && typeof flushPendingAudio === "function") flushPendingAudio();
}

// Try right away (works if the browser/site already allows autoplay)
unlockAudio();
window.addEventListener("load", unlockAudio, { once: true });
document.addEventListener("visibilitychange", () => { if (!document.hidden) unlockAudio(); });

// And unlock on the first real user activation, whatever it is
["pointerdown", "pointermove", "keydown", "touchstart", "click", "scroll", "focus", "mousemove"]
    .forEach(ev => window.addEventListener(ev, unlockAudio, { passive: true }));

// Keep gently retrying until audio is permitted
const unlockPoll = setInterval(() => {
    unlockAudio();
    if (audioUnlocked) clearInterval(unlockPoll);
}, 400);

// ─── AUDIO TOGGLE BUTTON ──────────────────────────────────────────────────────
const audioToggle = document.getElementById("audio-toggle");
function applyMuteState() {
    audioToggle.textContent = soundEnabled ? "🔊" : "🔇";
    audioToggle.classList.toggle("muted", !soundEnabled);
    audioToggle.title = soundEnabled ? "Mute sound" : "Unmute sound";
    if (masterGain) masterGain.gain.value = soundEnabled ? 1 : 0;
    if (!soundEnabled) {
        // Stop any MP3 clips that are currently playing
        activeSounds.forEach(a => { try { a.pause(); a.currentTime = 0; } catch (e) {} });
        activeSounds.clear();
        if ("speechSynthesis" in window) {
            try { window.speechSynthesis.cancel(); } catch (e) {}
        }
    }
}
audioToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    soundEnabled = !soundEnabled;
    if (soundEnabled) unlockAudio();   // make sure audio is permitted again
    applyMuteState();
});
applyMuteState();

// Throttle so overlapping explosions don't stack the sample too aggressively
let lastBoomSample = 0;

// Countdown tick beep — punchy two-tone blip
function beep(freq = 880, opts = {}) {
    try {
        const ctx = getCtx();
        const now = ctx.currentTime;
        const dur = opts.dur || 0.18;
        const peak = opts.peak || 0.3;

        // Master gain for this blip
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(peak, now + 0.008);
        master.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        master.connect(audioOut());

        // Fundamental + a bright harmonic for a richer, more "electronic" tick
        const partials = [[freq, "triangle", 1], [freq * 2, "sine", 0.35]];
        for (const [f, type, level] of partials) {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type;
            osc.frequency.value = f;
            g.gain.value = level;
            osc.connect(g).connect(master);
            osc.start(now);
            osc.stop(now + dur + 0.05);
        }
    } catch (e) {}
}

// Big final "GO" chime for the zero moment
function finalChime() {
    try {
        const ctx = getCtx();
        const now = ctx.currentTime;
        const freqs = [523.25, 659.25, 783.99, 1046.5]; // C-E-G-C major chord
        freqs.forEach((f, i) => {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = "triangle";
            osc.frequency.value = f;
            const t = now + i * 0.04;
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.28, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
            osc.connect(g).connect(audioOut());
            osc.start(t);
            osc.stop(t + 1.5);
        });
    } catch (e) {}
}

// Opening bars of "Auld Lang Syne"
function playAuldLangSyne() {
    try {
        const ctx = getCtx();
        // Note frequencies
        const N = { G3:196, C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392, A4:440, C5:523.25 };
        // (note, beats) — classic opening phrase
        const melody = [
            ["G3",1], ["C4",1.5], ["C4",0.5], ["C4",1], ["E4",1.5], ["D4",0.5],
            ["C4",1.5], ["D4",0.5], ["E4",1], ["C4",1.5], ["C4",0.5], ["E4",1],
            ["G4",1.5], ["A4",0.5], ["A4",2.5]
        ];
        const beat = 0.42;
        let t = ctx.currentTime + 0.1;
        for (const [note, beats] of melody) {
            const dur = beats * beat;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "triangle";
            osc.frequency.value = N[note];
            gain.gain.setValueAtTime(0.0001, t);
            gain.gain.exponentialRampToValueAtTime(0.25, t + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.95);
            osc.connect(gain).connect(audioOut());
            osc.start(t);
            osc.stop(t + dur);
            t += dur;
        }
    } catch (e) {}
}

// Firework explosion — low boom + crackle
function fireworkBoom() {
    // Prefer the real firework recording; throttle so rapid volleys don't overload
    const nowMs = performance.now();
    if (soundElements["fireworks"] && !soundFailed["fireworks"] && nowMs - lastBoomSample > 90) {
        lastBoomSample = nowMs;
        // Slight random volume + pitch variation for a natural, varied show
        if (playSound("fireworks", 0.5 + Math.random() * 0.35, 0.92 + Math.random() * 0.18)) return;
    }
    try {
        const ctx = getCtx();
        const now = ctx.currentTime;

        // Low-frequency boom (the "thump" of the blast)
        const boom = ctx.createOscillator();
        const boomGain = ctx.createGain();
        boom.type = "sine";
        boom.frequency.setValueAtTime(150, now);
        boom.frequency.exponentialRampToValueAtTime(40, now + 0.35);
        boomGain.gain.setValueAtTime(0.0001, now);
        boomGain.gain.exponentialRampToValueAtTime(0.4, now + 0.02);
        boomGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        boom.connect(boomGain).connect(audioOut());
        boom.start(now);
        boom.stop(now + 0.5);

        // Noise burst for the crackle/sparkle
        const dur = 0.6;
        const buffer = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            // Decaying noise
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
        }
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = "bandpass";
        noiseFilter.frequency.setValueAtTime(1200, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(400, now + dur);
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.25, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        noise.connect(noiseFilter).connect(noiseGain).connect(audioOut());
        noise.start(now);
        noise.stop(now + dur);
    } catch (e) {}
}

// Crowd cheering — layered filtered noise swells + a few whistles
function crowdCheer(intensity = 1) {
    try {
        const ctx = getCtx();
        const now = ctx.currentTime;
        const dur = 2.4 + Math.random() * 1.5;

        // Roar: filtered noise with a swell up and slow fade
        const buffer = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;

        const bp = ctx.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.value = 900;
        bp.Q.value = 0.7;

        const hp = ctx.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.value = 400;

        const g = ctx.createGain();
        const peak = 0.18 * intensity;
        g.gain.setValueAtTime(0.0001, now);
        g.gain.linearRampToValueAtTime(peak, now + 0.5);     // swell in
        g.gain.linearRampToValueAtTime(peak * 0.8, now + dur * 0.6);
        g.gain.exponentialRampToValueAtTime(0.0001, now + dur); // fade out
        noise.connect(bp).connect(hp).connect(g).connect(audioOut());
        noise.start(now);
        noise.stop(now + dur);

        // A couple of celebratory whistles
        const whistles = Math.floor(Math.random() * 3);
        for (let i = 0; i < whistles; i++) {
            const t = now + 0.3 + Math.random() * (dur - 1);
            const osc = ctx.createOscillator();
            const wg = ctx.createGain();
            osc.type = "sine";
            const base = 1600 + Math.random() * 800;
            osc.frequency.setValueAtTime(base, t);
            osc.frequency.linearRampToValueAtTime(base + 400, t + 0.15);
            osc.frequency.linearRampToValueAtTime(base - 200, t + 0.4);
            wg.gain.setValueAtTime(0.0001, t);
            wg.gain.exponentialRampToValueAtTime(0.08, t + 0.05);
            wg.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
            osc.connect(wg).connect(audioOut());
            osc.start(t);
            osc.stop(t + 0.55);
        }
    } catch (e) {}
}

// Realistic spoken "Happy New Year!" via the browser's speech engine
function speakHappyNewYear() {
    try {
        if (!soundEnabled) return;
        if (!("speechSynthesis" in window)) return;
        const say = () => {
            const u = new SpeechSynthesisUtterance("Happy New Year!");
            u.rate = 0.95;
            u.pitch = 1.1;
            u.volume = 1;
            // Prefer a natural-sounding English voice if available
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v =>
                /Google US English|Microsoft (Aria|Jenny|Zira|Guy)|Samantha|Natural/i.test(v.name)
            ) || voices.find(v => /^en[-_]/i.test(v.lang));
            if (preferred) u.voice = preferred;
            window.speechSynthesis.speak(u);
        };
        // Voices may load asynchronously
        if (window.speechSynthesis.getVoices().length === 0) {
            window.speechSynthesis.addEventListener("voiceschanged", say, { once: true });
            setTimeout(say, 250); // fallback if the event never fires
        } else {
            say();
        }
    } catch (e) {}
}

// ─── CELEBRATION ──────────────────────────────────────────────────────────────
let celebrationStarted = false;
let cheerPlayed = false;

// Called when audio becomes available — plays the cheer if it's still pending
function flushPendingAudio() {
    if (celebrationStarted && !cheerPlayed) {
        if (playSound("cheer", 0.9)) cheerPlayed = true;
    }
}

function startCelebration() {
    if (celebrationStarted) return;
    celebrationStarted = true;

    celebrationEl.style.display = "flex";
    // Fade in on the next frame so the CSS transition runs
    requestAnimationFrame(() => celebrationEl.classList.add("show"));

    // The big moment: chime, then the real crowd cheer (or synth fallback)
    finalChime();
    if (playSound("cheer", 0.9)) {
        cheerPlayed = true;
    } else {
        // Audio not permitted yet — use the synth cheer now, and the MP3 will
        // play automatically the instant audio unlocks (see flushPendingAudio)
        crowdCheer(1.4);
        setTimeout(speakHappyNewYear, 700);
    }
    setTimeout(playAuldLangSyne, 2600);

    fwRunning = true;
    animateFW();
    confettiRunning = true;
    drawConfetti();

    // Opening barrage — big Times Square midnight moment
    for (let i = 0; i < 30; i++) {
        setTimeout(launchFirework, i * 130);
    }

    // Sustained show every 350ms
    const fwInterval   = setInterval(launchFirework,     350);
    // Confetti drifts down in gentle waves every 2.5s
    const confInterval = setInterval(makeConfettiBurst, 2500);
    // Crowd cheers roll in every few seconds
    const cheerInterval = setInterval(() => crowdCheer(0.8 + Math.random() * 0.5), 4500);

    makeConfettiBurst();

    // Stop after 2 minutes
    setTimeout(() => {
        clearInterval(fwInterval);
        clearInterval(confInterval);
        clearInterval(cheerInterval);
        fwRunning      = false;
        confettiRunning = false;
    }, 120000);
}
</script>

</body>
